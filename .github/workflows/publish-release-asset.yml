name: Publish release asset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-release-asset.yml

permissions:
  contents: write

jobs:
  upload-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Normalize asset name
        shell: pwsh
        run: Copy-Item -LiteralPath "release\陪练猫工具包 Setup 0.1.1.exe" -Destination "release\Setup.0.1.1.exe" -Force

      - name: Upload installer to v0.1.1
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.1 "release\Setup.0.1.1.exe" --clobber
