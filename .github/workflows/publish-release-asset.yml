name: Publish release asset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-release-asset.yml

permissions:
  contents: write

jobs:
  upload-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Normalize asset name
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path release -Filter "*Setup 0.1.3.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer for 0.1.3 was not found" }
          Copy-Item -LiteralPath $installer.FullName -Destination "release\Setup.0.1.3.exe" -Force

      - name: Create release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v0.1.3 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create v0.1.3 --target main --title "Peilian Cat Toolkit v0.1.3" --notes "AI Moments prompt wiring: today suggestions and rewrite share the rewrite prompt, with a new backend-editable generate prompt."
          }

      - name: Upload installer to v0.1.3
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v0.1.3 "release\Setup.0.1.3.exe" --clobber
