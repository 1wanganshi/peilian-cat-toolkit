name: Publish release asset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - .github/workflows/publish-release-asset.yml

permissions:
  contents: write

jobs:
  upload-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Normalize asset name
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path release -Filter "*Setup $version.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer for $version was not found" }
          Copy-Item -LiteralPath $installer.FullName -Destination "release\Setup.$version.exe" -Force

      - name: Create release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release view "v$version" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "v$version" --target main --title "Peilian Cat Toolkit v$version" --notes "Add one-click sync for Wang Anshi private models in the frontend advanced model panel, verify the backend private model status before switching, and show a synced state after the backend model connection is saved locally."
          }

      - name: Upload installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "v$version" "release\Setup.$version.exe" --clobber
