name: Publish release asset

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - .github/workflows/publish-release-asset.yml

permissions:
  contents: write

jobs:
  upload-windows-installer:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        shell: pwsh
        run: |
          npm run build
          npx electron-builder --publish never

      - name: Normalize asset name
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $installer = Get-ChildItem -Path release -Filter "*Setup $version.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer for $version was not found" }
          Copy-Item -LiteralPath $installer.FullName -Destination "release\Setup.$version.exe" -Force

      - name: Create release if missing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release view "v$version" 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create "v$version" --target main --title "Peilian Cat Toolkit v$version" --notes "Add private/own model switching, fix script generation so model failures surface clearly instead of using preset templates, embed Moments planning into the main admin page, and preserve Moments pool materials across backend saves."
          }

      - name: Upload installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          gh release upload "v$version" "release\Setup.$version.exe" --clobber
